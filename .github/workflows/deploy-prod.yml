name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Staging image SHA to promote to prod (e.g. staging-abc1234)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod  # requires manual approval in GitHub Environments settings
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::682812950646:role/nightingale-prod-github-actions
          aws-region: ap-southeast-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag staging image as prod
        run: |
          IMAGE_URI=${{ secrets.ECR_REGISTRY }}/nightingale/api
          SOURCE_TAG=${{ github.event.inputs.image_tag }}

          # Pull the validated staging image and retag for prod
          docker pull $IMAGE_URI:$SOURCE_TAG
          docker tag  $IMAGE_URI:$SOURCE_TAG $IMAGE_URI:prod-latest
          docker tag  $IMAGE_URI:$SOURCE_TAG $IMAGE_URI:prod-${{ github.sha }}
          docker push $IMAGE_URI:prod-latest
          docker push $IMAGE_URI:prod-${{ github.sha }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster nightingale-prod \
            --service nightingale-prod-api \
            --force-new-deployment \
            --region ap-southeast-2

      - name: Wait for deployment to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster nightingale-prod \
            --services nightingale-prod-api \
            --region ap-southeast-2

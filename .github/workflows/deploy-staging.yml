name: Deploy — Staging

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::682812950646:role/nightingale-staging-github-actions
          aws-region: ap-southeast-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          IMAGE_URI=${{ secrets.ECR_REGISTRY }}/nightingale/api
          docker build -t $IMAGE_URI:staging-latest -t $IMAGE_URI:staging-${{ github.sha }} .
          docker push $IMAGE_URI:staging-latest
          docker push $IMAGE_URI:staging-${{ github.sha }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster nightingale-staging \
            --service nightingale-staging-api \
            --force-new-deployment \
            --region ap-southeast-2

      - name: Wait for deployment to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster nightingale-staging \
            --services nightingale-staging-api \
            --region ap-southeast-2

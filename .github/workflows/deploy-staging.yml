name: Deploy — Staging

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::682812950646:role/nightingale-staging-github-actions
          aws-region: ap-southeast-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          IMAGE_URI=${{ secrets.ECR_REGISTRY }}/nightingale/api
          docker build -f api/Dockerfile -t $IMAGE_URI:staging-latest -t $IMAGE_URI:staging-${{ github.sha }} .
          docker push $IMAGE_URI:staging-latest
          docker push $IMAGE_URI:staging-${{ github.sha }}

      - name: Run database migrations
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition nightingale-staging-api \
            --region ap-southeast-2 \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          # Pull network config from the running service — subnets/SGs stay in sync automatically
          NET_CONFIG=$(aws ecs describe-services \
            --cluster nightingale-staging \
            --services nightingale-staging-api \
            --region ap-southeast-2 \
            --query "services[0].networkConfiguration.awsvpcConfiguration" \
            --output json)
          SUBNETS=$(echo $NET_CONFIG | jq -r '[.subnets[]] | join(",")' | sed 's/,/","/g' | sed 's/^/"/' | sed 's/$/"/')
          SGS=$(echo $NET_CONFIG | jq -r '[.securityGroups[]] | join(",")' | sed 's/,/","/g' | sed 's/^/"/' | sed 's/$/"/')

          TASK_ARN=$(aws ecs run-task \
            --cluster nightingale-staging \
            --task-definition $TASK_DEF \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SGS],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["node","dist/scripts/migrate.js"]}]}' \
            --region ap-southeast-2 \
            --query "tasks[0].taskArn" \
            --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster nightingale-staging \
            --tasks $TASK_ARN \
            --region ap-southeast-2

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster nightingale-staging \
            --tasks $TASK_ARN \
            --region ap-southeast-2 \
            --query "tasks[0].containers[0].exitCode" \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrations completed successfully"

      - name: Run embeddings backfill
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition nightingale-staging-api \
            --region ap-southeast-2 \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          NET_CONFIG=$(aws ecs describe-services \
            --cluster nightingale-staging \
            --services nightingale-staging-api \
            --region ap-southeast-2 \
            --query "services[0].networkConfiguration.awsvpcConfiguration" \
            --output json)
          SUBNETS=$(echo $NET_CONFIG | jq -r '[.subnets[]] | join(",")' | sed 's/,/","/g' | sed 's/^/"/' | sed 's/$/"/')
          SGS=$(echo $NET_CONFIG | jq -r '[.securityGroups[]] | join(",")' | sed 's/,/","/g' | sed 's/^/"/' | sed 's/$/"/')

          TASK_ARN=$(aws ecs run-task \
            --cluster nightingale-staging \
            --task-definition $TASK_DEF \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SGS],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["node","dist/scripts/generate-embeddings.js"]}]}' \
            --region ap-southeast-2 \
            --query "tasks[0].taskArn" \
            --output text)

          echo "Embeddings backfill task: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster nightingale-staging \
            --tasks $TASK_ARN \
            --region ap-southeast-2

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster nightingale-staging \
            --tasks $TASK_ARN \
            --region ap-southeast-2 \
            --query "tasks[0].containers[0].exitCode" \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Embeddings backfill task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Embeddings backfill completed successfully"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster nightingale-staging \
            --service nightingale-staging-api \
            --force-new-deployment \
            --region ap-southeast-2

      - name: Wait for deployment to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster nightingale-staging \
            --services nightingale-staging-api \
            --region ap-southeast-2
